# ============================================================
# 金融交易风险实时监控平台 - 主配置文件
# 默认激活 dev 开发版本
# 生产环境使用: java -jar xxx.jar --spring.profiles.active=prod
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: risk-dashboard
  profiles:
    active: dev   # 默认开发版本

  # Spring Boot 2.7 与 Swagger 兼容配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # Jackson 配置 (全局日期格式)
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # Redis 通用配置
  redis:
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 4
        max-wait: 3000ms

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true   # 驼峰命名自动映射
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations: classpath:mapper/*.xml

# 日志配置
logging:
  level:
    root: INFO
    com.finance.risk.dashboard: DEBUG
    com.finance.risk.dashboard.dao: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Swagger 配置
springfox:
  documentation:
    swagger-ui:
      enabled: true
