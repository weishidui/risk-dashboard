# ============================================================
# 开发版本配置文件 (dev)
# 特点：H2 内存数据库 + 免 Redis + 模拟数据支持
# 无需安装任何外部依赖即可运行，适合本地开发和调试
# ============================================================

spring:
  # ---- H2 内存数据库 ----
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:risk_control;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-on-borrow: true
      validation-query: SELECT 1

  # H2 控制台 (开发调试用, 访问 /h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # 自动执行建表脚本
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  # Redis (开发版 - 如果本地没有Redis也不影响启动，服务层已做降级处理)
  redis:
    host: localhost
    port: 6379
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 2

# 日志级别 (开发版更详细)
logging:
  level:
    com.finance.risk.dashboard: DEBUG
    com.finance.risk.dashboard.dao: DEBUG
    org.springframework.web.socket: DEBUG
